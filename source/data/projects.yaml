- name: k-DOPs as Bounding Volume Representation
  url: https://robkosm.github.io/three-kdop/
  img: kdop.png
  contributors:
    - name: robkosm
  description: >
    Bounding volumes offer efficient intersection tests for 3D objects.
    They help optimize tasks like rendering, physics, and user interaction.
    Although Three.js includes several types of bounding volumes, it currently lacks support for k-DOPs.
    This project aims to explore how k-DOPs can be integrated into Three.js and compares their performance with other bounding volumes.