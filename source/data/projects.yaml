- name: Block Decay Effect
  url: https://zerhacker1.github.io/blockdecaydemo/
  img: blockdecay.png
  contributors:
    - name: zerhacker1
  description: >
    ModelDecay introduces a solution for voxelization and animation within the Three.js library.
    This tool enables developers to take a 3D model and convert it into a voxelized representation, subsequently animating the fall of these voxels.
    The prinicipal objective was to examine the possibility of vanishing/decaying 3D model as a type of object in Three.js tested specifically on said voxelization effect.
