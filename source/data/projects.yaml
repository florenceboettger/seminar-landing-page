- name: World-in-Hand Navigation
  url: https://orbitnavjs.github.io/WIHNavigationWebsite/
  img: wih.png
  contributors:
    - name: Stastez
    - name: BelanaZ
  description: >
    This navigation method aims to enhance the user experience by allowing users to interact with the virtual world as if it were a tangible object in their hands.
    By bridging the gap between the user's interaction and the virtual camera's movement, World-In-Hand Navigation offers a more intuitive, robust, and user-friendly navigation experience compared to the traditional navigation controls provided by Three.js.
